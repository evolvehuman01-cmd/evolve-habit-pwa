<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1C2B3A" />
    <meta name="description" content="Your daily habit tracker from Evolve:Wellbeing" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Evolve" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/ico" href="/favicon.ico" />
    <title>Evolve:Wellbeing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "c76ea6ee-b57d-4663-8bc7-a3d28b113c10",
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: true,
        });
      });
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-text-size-adjust: 100%; }
      body {
        background: #F0EEF5;
        color: #1C2B3A;
        font-family: 'Barlow', sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      #root { min-height: 100vh; min-height: -webkit-fill-available; }
      input, textarea, select, button { font-family: 'Barlow', sans-serif; }
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('SW registered'))
            .catch(err => console.warn('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
